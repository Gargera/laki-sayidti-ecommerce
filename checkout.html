  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    @keyframes fadeUp { from { opacity:0; transform:translateY(24px);} to { opacity:1; transform:translateY(0);} }

  </style>

</head>

    </div>

        <pre >لا صلي عالنبي كده</pre>
        <pre> 🏃‍♀️ دي منتجات وهمية مفيش دفع ولا حاجة </pre>
        <button id="Back" class="bg-purple-700 text-white font-semibold my-5 py-4 px-4 rounded-xl text-base">Back to Home</button>
    </div>

  </div>

  <script src="checkout.js"></script>

</html>
